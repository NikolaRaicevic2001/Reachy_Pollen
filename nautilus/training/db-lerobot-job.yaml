apiVersion: batch/v1
kind: Job
metadata:
  name: lerobot-training-job-template
spec:
  template:
    spec:
      containers:

      - name: gpu-container-1
        image: nikolaraicevic2001/erl-lerobot:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a SAC --total-timesteps 50000 --track --exp_name multigpu_sac' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu1.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /nikola_vol
          name: nikola-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32G"
            cpu: "1.8"
          requests:
            nvidia.com/gpu: "1"
            memory: "24G"
            cpu: "1.5"
      
      - name: gpu-container-2
        image: huggingface/lerobot-gpu@sha256:da85358de50c2ad135d54628e8b92a69a24eb9fe2b518f2d0d82c97a25b3f709
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a CQL --total-timesteps 1000 --track --exp_name multigpu_cql' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu2.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /nikola_vol
          name: nikola-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32G"
            cpu: "2"
          requests:
            nvidia.com/gpu: "1"
            memory: "24G"
            cpu: "1.8"
      
      affinity:
        nodeAffinity:
          # GPU preferences only, grouped by VRAM (descending) per cluster inventory;
          # tiers 480 > 80 > 48 > 40 > 32 (GB); nothing below 32.
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-GH200-480GB"
          - weight: 80
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A100-80GB-PCIe"
                - "NVIDIA-A100-SXM4-80GB"
                - "NVIDIA-A100-80GB-PCIe-MIG-1g.10gb"
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-RTX-A6000"
                - "NVIDIA-A40"
                - "NVIDIA-L40"
                - "Quadro-RTX-8000"
          - weight: 50
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A100-PCIE-40GB"
          - weight: 40
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "Tesla-V100-SXM2-32GB"
      restartPolicy: Never
      volumes:
        - name: db-cephfs-volume
          persistentVolumeClaim:
            claimName: db-cephfs-volume
        - name: nikola-volume
          persistentVolumeClaim:
            claimName: nikola-volume
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
