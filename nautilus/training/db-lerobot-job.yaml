apiVersion: batch/v1
kind: Job
metadata:
  name: lerobot-training-job-template
spec:
  template:
    spec:
      containers:

      - name: gpu-container-1
        image: dhbhatt/rainbow-demorl:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a SAC --total-timesteps 50000 --track --exp_name multigpu_sac' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu1.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "10.2G"
            cpu: "1.8"
          requests:
            nvidia.com/gpu: "1"
            memory: "8.5G"
            cpu: "1.5"
      
      - name: gpu-container-2
        image: dhbhatt/rainbow-demorl:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a CQL --total-timesteps 1000 --track --exp_name multigpu_cql' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu2.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "10.2G"
            cpu: "1.8"
          requests:
            nvidia.com/gpu: "1"
            memory: "8.5G"
            cpu: "1.5"
      
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: # All of these nodes have RTX-4090, total count 24
                - "v100-cc-star-01.noc.ucsb.edu"
                - "uicnrp-fiona.evl.uic.edu"
                - "hcc-nrp-shor-c5226.unl.edu"
                - "hcc-nrp-shor-c5834.unl.edu"
                - "hcc-nrp-shor-c5934.unl.edu"
                - "hcc-nrp-shor-c6034.unl.edu"
          # - weight: 80
          #   preference:
          #     matchExpressions:
          #     - key: kubernetes.io/hostname
          #       operator: In
          #       values: # All of these nodes have RTX-3090, total count 155
          #       - "ry-gpu-01.sdsc.optiputer.net"
          #       - "ry-gpu-02.sdsc.optiputer.net"
          #       - "ry-gpu-03.sdsc.optiputer.net"
          #       - "ry-gpu-04.sdsc.optiputer.net"
          #       - "ry-gpu-05.sdsc.optiputer.net"
          #       - "ry-gpu-06.sdsc.optiputer.net"
          #       - "ry-gpu-07.sdsc.optiputer.net"
          #       - "ry-gpu-08.sdsc.optiputer.net"
          #       - "ry-gpu-09.sdsc.optiputer.net"
          #       - "ry-gpu-10.sdsc.optiputer.net"
          #       - "ry-gpu-11.sdsc.optiputer.net"
          #       # - "ry-gpu-12.sdsc.optiputer.net"
          #       - "ry-gpu-13.sdsc.optiputer.net"
          #       - "ry-gpu-14.sdsc.optiputer.net"
          #       - "knuron.calit2.optiputer.net"
          #       - "k8s-chase-ci-07.calit2.optiputer.net"
          #       - "hcc-chase-shor-c4715.unl.edu"
          #       - "hcc-chase-shor-c4709.unl.edu"
          #       - "csusb-sci-103-11.csusb.edu"
          #       - "uicnrp-fiona.evl.uic.edu"
          #       - "uicnrp-fiona2.evl.uic.edu"
          # - weight: 50
          #   preference:
          #     matchExpressions:
          #     - key: kubernetes.io/hostname
          #       operator: In
          #       values: # k8s-haosu-02 to k8s-haosu-23 have RTX-2080-Ti
          #       - "k8s-haosu-02.sdsc.optiputer.net"
          #       - "k8s-haosu-03.sdsc.optiputer.net"
          #       - "k8s-haosu-04.sdsc.optiputer.net"
          #       - "k8s-haosu-05.sdsc.optiputer.net"
          #       - "k8s-haosu-06.sdsc.optiputer.net"
          #       - "k8s-haosu-07.sdsc.optiputer.net"
          #       - "k8s-haosu-08.sdsc.optiputer.net"
          #       - "k8s-haosu-09.sdsc.optiputer.net"
          #       - "k8s-haosu-10.sdsc.optiputer.net"
          #       - "k8s-haosu-11.sdsc.optiputer.net"
          #       - "k8s-haosu-12.sdsc.optiputer.net"
          #       - "k8s-haosu-13.sdsc.optiputer.net"
          #       - "k8s-haosu-14.sdsc.optiputer.net"
          #       - "k8s-haosu-15.sdsc.optiputer.net"
          #       - "k8s-haosu-16.sdsc.optiputer.net"
          #       - "k8s-haosu-17.sdsc.optiputer.net"
          #       - "k8s-haosu-18.sdsc.optiputer.net"
          #       - "k8s-haosu-19.sdsc.optiputer.net"
          #       - "k8s-haosu-20.sdsc.optiputer.net"
          #       - "k8s-haosu-21.sdsc.optiputer.net"
          #       - "k8s-haosu-22.sdsc.optiputer.net"
          #       - "k8s-haosu-23.sdsc.optiputer.net"
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-GeForce-RTX-4090"
                - "NVIDIA-GeForce-RTX-4080"
                - "NVIDIA-GeForce-RTX-3090-Ti"
                - "NVIDIA-GeForce-RTX-3090"
                - "NVIDIA-GeForce-RTX-3080-Ti"
                - "NVIDIA-GeForce-RTX-3080"
          - weight: 50
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A100-80GB-PCIe"
                - "NVIDIA-A100-SXM4-80GB"
                - "NVIDIA-A100-80GB-PCIe-MIG-1g.10gb"
                - "NVIDIA-A100-PCIE-40GB"
                - "NVIDIA-RTX-A6000"
                - "NVIDIA-RTX-A5000"
          - weight: 40
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A40"
                - "Tesla-V100-SXM2-32GB"
                - "Tesla-V100-PCIE-16GB"
          - weight: 30
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-TITAN-RTX"
                - "NVIDIA-TITAN-Xp"
                - "NVIDIA-L40"
                - "NVIDIA-A10"
      restartPolicy: Never
      volumes:
        - name: db-cephfs-volume
          persistentVolumeClaim:
            claimName: db-cephfs-volume
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
