apiVersion: batch/v1
kind: Job
metadata:
  name: lerobot-training-job-template
spec:
  template:
    spec:
      containers:

      - name: gpu-container-1
        image: nikolaraicevic2001/erl-lerobot:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a SAC --total-timesteps 50000 --track --exp_name multigpu_sac' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu1.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /nikola_vol
          name: nikola-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32G"
            cpu: "1.8"
          requests:
            nvidia.com/gpu: "1"
            memory: "24G"
            cpu: "1.5"
      
      - name: gpu-container-2
        image: huggingface/lerobot-gpu@sha256:da85358de50c2ad135d54628e8b92a69a24eb9fe2b518f2d0d82c97a25b3f709
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e && \
          git config --global url."https://${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/" && \
          git fetch origin main && git reset --hard origin/main && \
          mkdir -p /pers_vol/dwait/logs && \
          bash -c 'yes | python rainbow_demorl/train.py -a CQL --total-timesteps 1000 --track --exp_name multigpu_cql' --wandb_group nautilus_test > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot-gpu2.log
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-secret
              key: api-key
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: hf-access-token
        - name: GIT_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-dwait
              key: GIT_ACCESS_TOKEN
        volumeMounts:
        - mountPath: /pers_vol
          name: db-cephfs-volume
        - mountPath: /nikola_vol
          name: nikola-volume
        - mountPath: /dev/shm
          name: dshm
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32G"
            cpu: "1.8"
          requests:
            nvidia.com/gpu: "1"
            memory: "24G"
            cpu: "1.5"
      
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "rci-tide-gpu-01.sdsu.edu"
                - "rci-tide-gpu-02.sdsu.edu"
                - "rci-tide-gpu-03.sdsu.edu"
                - "rci-tide-gpu-04.sdsu.edu"
                - "rci-tide-gpu-05.sdsu.edu"
                - "rci-tide-gpu-06.sdsu.edu"
                - "rci-tide-gpu-07.sdsu.edu"
                - "rci-tide-gpu-08.sdsu.edu"
                - "rci-tide-gpu-09.sdsu.edu"
                - "rci-tide-gpu-10.sdsu.edu"
                - "rci-tide-gpu-11.sdsu.edu"
                - "rci-tide-gpu-12.sdsu.edu"
                - "rci-tide-gpu-13.sdsu.edu"
                - "rci-tide-gpu-14.sdsu.edu"
                - "rci-tide-gpu-15.sdsu.edu"
                - "rci-tide-gpu-16.sdsu.edu"
                - "rci-tide-gpu-17.sdsu.edu"
          - weight: 100
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-L40"
          - weight: 80
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "ry-gpu-01.sdsc.optiputer.net"
                - "ry-gpu-02.sdsc.optiputer.net"
                - "ry-gpu-03.sdsc.optiputer.net"
                - "ry-gpu-04.sdsc.optiputer.net"
                - "ry-gpu-05.sdsc.optiputer.net"
                - "ry-gpu-06.sdsc.optiputer.net"
                - "ry-gpu-07.sdsc.optiputer.net"
                - "ry-gpu-08.sdsc.optiputer.net"
                - "ry-gpu-09.sdsc.optiputer.net"
                - "ry-gpu-10.sdsc.optiputer.net"
                - "ry-gpu-11.sdsc.optiputer.net"
                - "ry-gpu-12.sdsc.optiputer.net"
                - "ry-gpu-13.sdsc.optiputer.net"
                - "ry-gpu-14.sdsc.optiputer.net"
                - "ry-gpu-15.sdsc.optiputer.net"
                - "ry-gpu-16.sdsc.optiputer.net"
                - "k8s-3090-01.calit2.optiputer.net"
                - "k8s-4090-01.calit2.optiputer.net"
                - "k8s-4090-02.calit2.optiputer.net"
          - weight: 80
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A100-80GB-PCIe"
                - "NVIDIA-A100-SXM4-80GB"
                - "NVIDIA-A100-80GB-PCIe-MIG-1g.10gb"
                - "NVIDIA-A100-PCIE-40GB"
                - "NVIDIA-RTX-A6000"
                - "NVIDIA-RTX-A5000"
                - "NVIDIA-GeForce-RTX-4090"
                - "NVIDIA-GeForce-RTX-4080"
                - "NVIDIA-GeForce-RTX-3090-Ti"
                - "NVIDIA-GeForce-RTX-3090"
                - "NVIDIA-GeForce-RTX-3080-Ti"
                - "NVIDIA-GeForce-RTX-3080"
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-A40"
                - "Tesla-V100-PCIE-16GB"
          - weight: 60
            preference:
              matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - "NVIDIA-TITAN-RTX"
                - "NVIDIA-GeForce-RTX-2080-Ti"
                - "NVIDIA-TITAN-Xp"
                - "NVIDIA-A10"
      restartPolicy: Never
      volumes:
        - name: db-cephfs-volume
          persistentVolumeClaim:
            claimName: db-cephfs-volume
        - name: nikola-volume
          persistentVolumeClaim:
            claimName: nikola-volume
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
