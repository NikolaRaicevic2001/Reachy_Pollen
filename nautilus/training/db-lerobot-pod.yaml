apiVersion: v1
kind: Pod
metadata:
  name: lerobot-training-pod-template
spec:
  containers:
  - name: gpu-container
    image: nikolaraicevic2001/erl-lerobot:latest
    command: ["/bin/bash", "-c"]
    args: [
        "git pull && \
        python rainbow_demorl/train.py \
            > /pers_vol/dwait/logs/$(date +%Y-%m-%d_%H-%M-%S)-lerobot.log"
    ]
    env:
    - name: WANDB_API_KEY
      valueFrom:
        secretKeyRef:
          name: wandb-secret
          key: api-key
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token-secret
          key: hf-access-token
    - name: GIT_ACCESS_TOKEN
      valueFrom:
        secretKeyRef:
          name: github-token-dwait
          key: GIT_ACCESS_TOKEN
    volumeMounts:
    - mountPath: /pers_vol
      name: db-cephfs-volume
    - mountPath: /nikola_vol
      name: nikola-volume
    # PyTorch DataLoader workers need enough POSIX shm; default /dev/shm is ~64Mi in K8s.
    - mountPath: /dev/shm
      name: dshm
    resources:
      limits:
        nvidia.com/gpu: "1"
        memory: "32G"
        cpu: "1.8"
      requests:
        nvidia.com/gpu: "1"
        memory: "24G"
        cpu: "1.5"
  restartPolicy: Never
  affinity:
    nodeAffinity:
      # GPU preferences only, grouped by VRAM (descending) per cluster inventory.
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - "NVIDIA-GH200-480GB"
      - weight: 80
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - "NVIDIA-A100-80GB-PCIe"
            - "NVIDIA-A100-SXM4-80GB"
            - "NVIDIA-A100-80GB-PCIe-MIG-1g.10gb"
      - weight: 60
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - "NVIDIA-RTX-A6000"
            - "NVIDIA-A40"
            - "NVIDIA-L40"
      - weight: 50
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - "NVIDIA-A100-PCIE-40GB"
      - weight: 40
        preference:
          matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - "NVIDIA-GeForce-RTX-4090"
            - "NVIDIA-RTX-A5000"
            - "NVIDIA-A10"
            - "NVIDIA-L4"
  volumes:
    - name: db-cephfs-volume
      persistentVolumeClaim:
        claimName: db-cephfs-volume
    - name: nikola-volume
      persistentVolumeClaim:
        claimName: nikola-volume
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
